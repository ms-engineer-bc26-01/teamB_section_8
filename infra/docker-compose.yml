services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=closet_db
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - APP_ENV=${APP_ENV}
      - FIREBASE_WEB_API_KEY=${FIREBASE_WEB_API_KEY}
      - FIREBASE_CONFIG_PATH=/run/secrets/firebase/serviceAccountKey.json
      - DEV_USER_UID=${DEV_USER_UID:-dev-user}
      - DEV_USER_EMAIL=${DEV_USER_EMAIL:-dev@example.com}
      - ALLOW_DEV_AUTH_BYPASS=${ALLOW_DEV_AUTH_BYPASS:-false}
    volumes:
      - ./uploads:/app/uploads
      - ../.secrets/firebase:/run/secrets/firebase:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: closet_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d closet_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
